<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Header bar (visible in results state) -->
    <header id="headerBar">
        <h3 id="titleSmall">Doc<span class="accent">Harvest</span></h3>
        <span id="fileCount"></span>
    </header>

    <!-- Hero section (visible in initial state) -->
    <section id="hero">
        <div id="heroIcon">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#6c63ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
        </div>
        <h1>Doc<span class="accent">Harvest</span></h1>
        <p id="tagline">Bulk download your Google Classroom documents in just a few clicks.</p>
        <button id="runScript">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="13 17 18 12 13 7"/>
                <polyline points="6 17 11 12 6 7"/>
            </svg>
            Extract Links
        </button>
        <p id="hint">Open a Google Classroom page first</p>
    </section>

    <!-- Loading state -->
    <section id="loadingState">
        <div class="spinner">
            <div class="dot dot1"></div>
            <div class="dot dot2"></div>
            <div class="dot dot3"></div>
        </div>
        <p id="loadingText">Scrolling page &amp; extracting links...</p>
        <button id="cancel">Cancel</button>
    </section>

    <!-- Results state -->
    <section id="resultsState">
        <div id="toolbar">
            <label id="selectAllLabel">
                <input type="checkbox" id="selAllCheck">
                <span>Select All</span>
            </label>
            <span id="selectedCount">0 / 0 selected</span>
        </div>
        <div class="titleBox">
            <ul id="titleList"></ul>
        </div>
        <div id="bottomBar">
            <button id="cancel2">Cancel</button>
            <button id="dwnbtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Download
            </button>
        </div>
    </section>

    <!-- Footer -->
    <footer id="footer">
        <span>Built for Google Classroom</span>
    </footer>

    <script src="content.js" charset="UTF-8"></script>
</body>

</html>
